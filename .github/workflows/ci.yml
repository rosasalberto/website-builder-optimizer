name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Build against a throwaway local SQLite so generateStaticParams/sitemap
      # have a DB; resilient reads return empty if anything is off.
      DATABASE_URI: file:./ci.db
      PAYLOAD_SECRET: ci_secret_not_used_in_prod
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_VERCEL_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Payload types + import map
        run: pnpm generate:types && pnpm generate:importmap

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: i18n parity
        run: node scripts/quality/i18n-parity.mjs

      - name: Build
        run: pnpm build

      - name: Artifact size guard (< 220 MB)
        run: node scripts/quality/check-artifact-size.mjs

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
